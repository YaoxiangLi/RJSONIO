<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 278" role="img" aria-labelledby="title desc">
  <title id="title">RJSONIO hex logo</title>
  <desc id="desc">A tidyverse-style hex sticker for the RJSONIO package with JSON braces and data nodes.</desc>
  <defs>
    <linearGradient id="hex-fill" x1="42" y1="34" x2="198" y2="244" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39B8D4"/>
      <stop offset="0.55" stop-color="#1F77B4"/>
      <stop offset="1" stop-color="#174A7C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#17324D" flood-opacity="0.24"/>
    </filter>
  </defs>

  <path filter="url(#shadow)" fill="url(#hex-fill)" stroke="#0E3558" stroke-width="8" stroke-linejoin="round"
        d="M120 8 226 69v140l-106 61L14 209V69L120 8z"/>
  <path fill="none" stroke="#FFFFFF" stroke-opacity="0.32" stroke-width="4"
        d="M120 24 210 76v126l-90 52-90-52V76l90-52z"/>

  <g fill="none" stroke="#D9F6FF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M78 81c-18 0-26 10-26 27v12c0 12-5 18-16 18 11 0 16 7 16 19v12c0 17 8 27 26 27"/>
    <path d="M162 81c18 0 26 10 26 27v12c0 12 5 18 16 18-11 0-16 7-16 19v12c0 17-8 27-26 27"/>
  </g>

  <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path fill="none" opacity="0.9" d="M84 123h30l22 31h31"/>
    <path fill="none" opacity="0.68" d="M84 154h27l21-31h35"/>
    <circle cx="75" cy="123" r="10" fill="#F2B84B"/>
    <circle cx="75" cy="154" r="10" fill="#F2B84B"/>
    <circle cx="173" cy="123" r="10" fill="#8CE2B0"/>
    <circle cx="173" cy="154" r="10" fill="#8CE2B0"/>
  </g>

  <text x="120" y="219" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="37" font-weight="700"
        letter-spacing="1.5" fill="#FFFFFF">RJSONIO</text>
  <text x="120" y="242" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700"
        letter-spacing="3" fill="#D9F6FF">JSON FOR R</text>
</svg>
