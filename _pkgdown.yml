url: https://yaoxiangli.github.io/RJSONIO/

template:
  bootstrap: 5
  bootswatch: cosmo

navbar:
  structure:
    left: [reference, articles, news]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/YaoxiangLi/RJSONIO
      aria-label: GitHub repository

articles:
  - title: Getting started
    contents:
      - rjsonio
      - parsing-json
      - writing-json
  - title: Reference workflows
    contents:
      - type-mapping
      - advanced-customization
      - connections-and-streaming
  - title: Benchmarks
    contents:
      - competitor-benchmarks

reference:
  - title: Read JSON
    desc: Parse JSON text, files, and connections into R objects.
    contents:
      - fromJSON
      - readJSONStream
      - basicJSONHandler
  - title: Write JSON
    desc: Serialize R objects to JSON.
    contents:
      - toJSON
      - emptyNamedList
  - title: Validate and simplify
    desc: Validate JSON and control simplification behavior.
    contents:
      - isValidJSON
      - Strict
      - StrictNumeric
      - StrictCharacter
      - StrictLogical
  - title: JavaScript helpers
    desc: Helpers for writing JSON values as JavaScript variables.
    contents:
      - asJSVars
  - title: Parser constants
    desc: Constants exposed by the JSON parser callback interface.
    contents:
      - starts_with("JSON_T_")
